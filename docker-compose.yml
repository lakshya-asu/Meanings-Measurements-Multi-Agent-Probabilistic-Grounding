services:
  mapg:
    image: ${GRAPH_EQA_IMAGE:-flux04/mapg_habitat:src}
    container_name: mapg_dev
    gpus: all
    env_file:
      - .env
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      DISPLAY: ${DISPLAY:-}
      QT_X11_NO_MITSHM: "1"
      QT_QPA_PLATFORM: xcb
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/workspace
      - ./datasets:/datasets
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: bash
